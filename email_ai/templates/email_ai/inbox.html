<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Spam Classifier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>

    <div class="container">

        <!-- Required requests -->
        <div class="d-flex justify-content-center align-items-center mt-5">
            <form method="post" class="border rounded-3 bg-light p-4 w-100" style="max-width: 400px;">
                {% csrf_token %}

                <h4 class="text-center mb-4">Email Spam or Ham</h4>

                <div class="mb-3">
                    <input type="email" name="email" id="Email" class="form-control" placeholder="Enter email address" required>
                </div>

                <div class="mb-3">
                    <input type="password" name="password" id="App Password" class="form-control" placeholder="Enter app password" required>
                    <div class="form-text text-center mt-3">
                        Use
                        <a href="https://support.google.com/accounts/answer/185833?hl=uz" target="_blank">
                            Gmail App Password
                        </a>
                    </div>
                </div>

                <div class="">
                    <button type="submit" class="btn btn-primary fw-bold w-100">Check Spam</button>
                </div>
            </form>
        </div>

        <!-- style="border:1px solid #ccc; padding:10px; margin:10px;" -->

        <!-- Results -->
        <div class="overflow-y-auto p-4 mt-5" style="max-height: 500px;">
            {% for email in emails %}
            <div class="border rounded-3 mt-3 p-3">
                <div class="text-primary fw-bold mb-1" style="font-size: 0.9rem;">
                    From: {{ email.sender }}
                </div>

                <h3 class="">{{ email.subject }}</h3>
                <p class="w-100">{{ email.body|truncatechars:160 }}...</p>

                <div class="d-flex justify-content-between align-items-center mt-3">
                    <div>
                        {% if email.label == "SPAM" %}
                            <span class="badge bg-danger fs-6">SPAM</span>
                        {% else %}
                            <span class="badge bg-success fs-6">HAM</span>
                        {% endif %}
                    </div>
                
                    <a href="https://mail.google.com/mail/u/0/#search/rfc822msgid:{{ email.message_id|urlencode }}" 
                       target="_blank" 
                       class="btn btn-sm btn-outline-primary rounded-pill px-3">
                       <i class="bi bi-envelope-open"></i> Open in Gmail
                    </a>
                </div>
                
            </div>
            {% endfor %}
        </div>
    </div>

</body>

</html>
